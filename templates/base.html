<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QI Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header class="site-header">
        <div class="site-header-inner">
            <div>
                <h1 class="site-title">Health Informatics QI Dashboard</h1>
                <p class="site-subtitle">Community Health System Quality Improvement Project</p>
            </div>

            <nav class="site-nav" aria-label="Primary navigation">
                <a href="{{ url_for('home') }}"
                   class="nav-link {% if active_page == 'home' %}active{% endif %}">
                   Home
                </a>
                <a href="{{ url_for('survey') }}"
                   class="nav-link {% if active_page == 'survey' %}active{% endif %}">
                   Survey
                </a>
                <a href="{{ url_for('about') }}"
                   class="nav-link {% if active_page == 'about' %}active{% endif %}">
                   About
                </a>
            </nav>
        </div>
    </header>

    <main id="main-content" class="page-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>Quality Improvement Team • Community Health System</p>
    </footer>
</body>
</html>
