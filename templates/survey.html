{% extends "base.html" %}

{% block title %}Survey | QI Dashboard{% endblock %}

{% block content %}
<section>
    <h2>QI Dashboard Feedback Survey</h2>
    <form method="post" action="{{ url_for('survey') }}">
        <div>
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div>
            <label for="role">Role</label>
            <select id="role" name="role" required>
                <option value="" disabled selected>Select your role</option>
                <option value="Nurse">Nurse</option>
                <option value="Physician">Physician</option>
                <option value="Analyst">Data Analyst</option>
                <option value="Administrator">Administrator</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <fieldset>
            <legend>Satisfaction (1–5)</legend>
            <label><input type="radio" name="satisfaction" value="1" required> 1</label>
            <label><input type="radio" name="satisfaction" value="2"> 2</label>
            <label><input type="radio" name="satisfaction" value="3"> 3</label>
            <label><input type="radio" name="satisfaction" value="4"> 4</label>
            <label><input type="radio" name="satisfaction" value="5"> 5</label>
        </fieldset>

        <div>
            <label for="comments">Comments</label>
            <textarea id="comments" name="comments" rows="4" cols="40" placeholder="Share one thing that would improve your dashboard workflow."></textarea>
        </div>

        <button type="submit">Submit Survey</button>
    </form>
</section>
{% endblock %}
